# Core Wayland/session environment.
# These are deliberately generic Arch/Hyprland settings, not Omarchy wrappers.

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
# Kvantum is installed and now has a local Everforest theme at ~/.config/Kvantum/Everforest.
# QT_STYLE_OVERRIDE makes Qt5/Qt6 apps use it without needing qt5ct/qt6ct.
env = QT_STYLE_OVERRIDE,kvantum
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

env = CLUTTER_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1

# Force GTK apps launched from Hyprland to use the local Everforest theme.
# Some GTK apps, especially GTK4/libadwaita apps, ignore gtk-theme-name unless this is set.
env = GTK_THEME,Everforest

env = XCURSOR_SIZE,24
