# Extra autostart processes
#
# Left mostly empty because this machine is using UWSM/systemd user services for
# the session, and these are already running right now:
#   waybar, mako, hypridle, xdg-desktop-portal-hyprland, pipewire, wireplumber
#
# If a future login starts without the bar/notifications, we can add fallback
# exec-once lines here.

# Wallpaper — solid Everforest background (#2D353B)
exec-once = swaybg -i $HOME/everforest-bg-1920x1080.png -m fill

# Night light
exec-once = uwsm app -- hyprsunset

# Example fallbacks, currently disabled to avoid duplicates:
# exec-once = waybar
# exec-once = mako
# exec-once = hypridle
