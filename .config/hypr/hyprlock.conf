# Islamic Everforest Hyprlock theme with manuscript geometry.
# Earlier backup: ~/.config-backups/hyprlock.conf-20260528-205833
# Backup before adding the geometric background: ~/.config-backups/hyprlock-islamic-everforest-20260528-210043.conf

general {
    hide_cursor = true
    ignore_empty_input = true
    grace = 0
    disable_loading_bar = false
}

# Deep Everforest green field.
background {
    monitor =
    path = /home/mehmet/.config/hypr/assets/islamic-everforest-lock.png
    color = rgba(1e2326ff)
}

# Subtle manuscript-panel shape behind the text.
shape {
    monitor =
    size = 640, 310
    color = rgba(2b3339c8)
    rounding = 28
    border_size = 2
    border_color = rgba(d8a657cc)
    rotate = 0
    xray = false
    position = 0, 5
    halign = center
    valign = center
}

# Thin lower accent line, like a page divider.
shape {
    monitor =
    size = 420, 2
    color = rgba(a7c080ee)
    rounding = 1
    border_size = 0
    position = 0, -82
    halign = center
    valign = center
}

# Bismillah header.
label {
    monitor =
    text = بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيمِ
    color = rgba(d8a657ff)
    font_size = 34
    font_family = Noto Naskh Arabic
    position = 0, 118
    halign = center
    valign = center
}

# Main clock.
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(d3c6aaff)
    font_size = 72
    font_family = CaskaydiaMono Nerd Font
    position = 0, 35
    halign = center
    valign = center
}

# Day/date line.
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(a7c080ff)
    font_size = 20
    font_family = CaskaydiaMono Nerd Font
    position = 0, -34
    halign = center
    valign = center
}

# Small counsel line.
label {
    monitor =
    text = الصبر مفتاح الفرج  —  Patience is the key to relief
    color = rgba(859289ff)
    font_size = 16
    font_family = Noto Naskh Arabic
    position = 0, -122
    halign = center
    valign = center
}

# Password field.
input-field {
    monitor =
    size = 360, 58
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.28
    dots_center = true
    outer_color = rgba(d8a657ff)
    inner_color = rgba(272e33ee)
    font_color = rgba(d3c6aaff)
    fade_on_empty = false
    placeholder_text = Enter the amanah
    hide_input = false
    check_color = rgba(a7c080ff)
    fail_color = rgba(e67e80ff)
    fail_text = <i>$FAIL</i>
    position = 0, -210
    halign = center
    valign = center
}
